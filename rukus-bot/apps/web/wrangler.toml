# Cloudflare Pages configuration for the Rukus dashboard.
#
# The bot does NOT deploy here — it runs on Railway. This is only the Next.js
# dashboard, built to the edge via @cloudflare/next-on-pages.
#
# Secrets (DISCORD_CLIENT_SECRET, AUTH_SECRET, SUPABASE_SERVICE_ROLE_KEY,
# DISCORD_BOT_TOKEN) are set in the Cloudflare dashboard → Pages → your project
# → Settings → Environment variables, NOT here. Only non-secret vars belong in
# this file.

name = "rukus-dashboard"
compatibility_date = "2024-09-23"
# nodejs_compat lets edge functions use a subset of Node APIs that next-on-pages
# and some deps rely on.
compatibility_flags = ["nodejs_compat"]

pages_build_output_dir = ".vercel/output/static"
